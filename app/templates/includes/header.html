<header>
    <div class="container">
        <p class="logo"><a href="{{ url_for('home.home') }}">forum.</a></p>

        <nav>
            <ul>
                <li><a>browse</a></li>  <!-- browse main topics/mainthread board     -->
                <li><a>threads</a></li> <!-- browse by threads, can filter     -->
                <li><a>support</a></li> 
            </ul>
        </nav>
    
        <div>
            {% if 'username' in session %}
                <p>Hello, {{ session['username'] }}</p>
                <button class="authButton" type="button"><a href="{{ url_for('authentication.logout') }}"><img src="../../static/imgs/sign-out.svg" alt=""></a></button>
            {% else %}
                <button class="authButton" type="button"><a href="{{ url_for('authentication.register') }}">register</a></button>
            {% endif %}
        </div>
    </div>
</header>
